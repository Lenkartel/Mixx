<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Starlink kwa Simu — by Yas</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color: transparent;
}

html,body{
margin:0;
padding:0;
font-family:"Plus Jakarta Sans",system-ui;
}

:root{
--primary:#0057b8;
--primary-dark:#003f86;
--primary-soft:#e8f2ff;
--accent:#ffd400;
--bg:#f5f9ff;
}

/* page background */

body{

background:
linear-gradient(180deg,#f7fbff,#dbeaff);

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

overflow-x:hidden;

}

/* waves */

.wave{
position:fixed;
width:900px;
height:900px;
border-radius:50%;

background:
radial-gradient(circle,
rgba(0,87,184,0.16),
transparent 70%);

filter:blur(50px);

animation:float 18s infinite linear;

z-index:-1;

}

.wave.one{
top:-300px;
left:-200px;
}

.wave.two{
bottom:-300px;
right:-200px;
animation-duration:25s;
}

.wave.three{
top:20%;
right:-300px;
animation-duration:22s;
}

@keyframes float{

0%{ transform:translateY(0px) rotate(0deg); }

50%{ transform:translateY(40px) rotate(10deg); }

100%{ transform:translateY(0px) rotate(0deg); }

}

/* page */

.page{

width:100%;
max-width:1050px;

background:white;

border-radius:24px;

padding:26px;

border:1px solid rgba(0,87,184,0.08);

box-shadow:
0 30px 70px rgba(0,87,184,0.10),
inset 0 1px 0 rgba(255,255,255,0.8);

backdrop-filter:blur(10px);

}

/* header */

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:20px;

flex-wrap:wrap;

}

.title-block h1{
margin:0;
font-size:28px;
font-weight:800;

background:linear-gradient(
90deg,
var(--primary),
#0099ff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title-block p{
margin:5px 0 0;
font-size:13px;
color:#555;
}

/* powered by */

.powered{

display:flex;
align-items:center;
gap:10px;

font-size:13px;
font-weight:600;

}

.powered img{

height:70px;

}

/* cards */

.plans-grid{

display:grid;
grid-template-columns:1fr;
gap:16px;

}

.plan-card{

position:relative;
overflow:hidden;

border-radius:24px;

padding:26px;

cursor:pointer;

background:linear-gradient(
135deg,
#ffffff,
#f8fbff
);

border:2px solid rgba(255,212,0,0.45);

transition:.25s;

backdrop-filter:blur(10px);

box-shadow:
0 25px 50px rgba(0,87,184,0.12);

}

/* glow */

.plan-card::before{

content:"";

position:absolute;

top:-40%;
right:-20%;

width:240px;
height:240px;

background:
radial-gradient(circle,
rgba(255,212,0,0.35),
transparent 70%);

filter:blur(25px);

}

.plan-card::after{

content:"";

position:absolute;

bottom:-40%;
left:-20%;

width:240px;
height:240px;

background:
radial-gradient(circle,
rgba(0,87,184,0.20),
transparent 70%);

filter:blur(20px);

}

/* hover */

.plan-card:hover{

transform:translateY(-6px) scale(1.01);

box-shadow:
0 30px 60px rgba(0,87,184,0.22);

}

/* icon */

.icon{

width:56px;
height:56px;

color:var(--accent);

opacity:.95;

margin-bottom:10px;

}

/* texts */

.plan-tag{

font-size:12px;

background:rgba(255,212,0,0.18);

color:var(--primary);

border:1px solid rgba(255,212,0,0.45);

padding:5px 10px;

border-radius:999px;

display:inline-block;

margin-bottom:10px;

font-weight:800;

}

.plan-name{

font-weight:800;
font-size:30px;

color:var(--primary);

margin-bottom:6px;

}

.plan-duration{

font-size:15px;
color:#444;

margin-bottom:10px;

font-weight:600;

}

.plan-price{

font-size:42px;

font-weight:900;

color:#00a651;

margin-bottom:8px;

}

.plan-cta{

font-size:15px;
font-weight:800;
color:var(--primary);

margin-top:10px;

}

/* modal */

.modal-overlay{

position:fixed;
inset:0;

background:rgba(0,0,0,0.45);

display:none;

align-items:center;
justify-content:center;

padding:20px;

}

.modal-box{

background:white;

padding:22px;

border-radius:18px;

width:100%;
max-width:420px;

box-shadow:
0 30px 60px rgba(0,0,0,0.25);

}

.modal-title{

font-weight:800;
margin-bottom:6px;

font-size:20px;

}

.modal-details{

background:#fafafa;

padding:12px;

border-radius:12px;

margin-bottom:12px;

}

.modal-footer{

display:flex;
justify-content:flex-end;
gap:10px;

}

.btn{

padding:12px 16px;

border-radius:12px;

border:0;

cursor:pointer;

font-weight:700;

}

.btn-primary{

background:linear-gradient(
135deg,
var(--primary),
#0072ef
);

color:white;

}

.btn-primary:hover{

background:var(--primary-dark);

}

.btn-ghost{

background:#eee;

}

.note{

margin-top:18px;

font-size:13px;

color:#555;

line-height:1.7;

}

/* responsive */

@media(max-width:720px){

.plan-name{

font-size:24px;

}

.plan-price{

font-size:34px;

}

}

</style>

</head>

<body>

<div class="wave one"></div>
<div class="wave two"></div>
<div class="wave three"></div>

<div class="page">

<header class="header">

<div class="title-block">

<h1>Starlink kwa Simu</h1>

<p>Intaneti ya kasi kupitia Yas Tanzania</p>

</div>

<div class="powered">

<span>Powered by</span>

<img src="assets/yas.svg">
<img src="assets/zantel.png">

</div>

</header>

<div class="plans-grid">

<div class="plan-card" data-id="100gb">

<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M2 8a16 16 0 0120 0"/>
<path d="M5 12a10 10 0 0114 0"/>
<path d="M8 16a4 4 0 018 0"/>
<circle cx="12" cy="20" r="1"/>
</svg>

<div class="plan-tag">OFa MAALUM 🔥</div>

<div class="plan-name">100GB BURE</div>

<div class="plan-duration">
Furahia intaneti ya kasi kwa matumizi ya kila siku
</div>

<div class="plan-price">
GRATIS
</div>

<div class="plan-cta">
Pokea kupitia Mixx →
</div>

</div>

</div>

<div class="note">
Ukichagua ofa hii utaelekezwa kwenye mfumo salama wa Mixx by Yas.<br>
Huduma itaunganishwa baada ya namba kuthibitishwa.
</div>

</div>

<div class="modal-overlay" id="modal">

<div class="modal-box">

<div class="modal-title" id="title"></div>

<p id="summary"></p>

<div class="modal-details" id="details"></div>

<div class="modal-footer">

<button class="btn btn-ghost" onclick="closeModal()">Funga</button>

<button class="btn btn-primary" onclick="goLogin()">Pokea kupitia Mixx</button>

</div>

</div>

</div>

<script>

const plans={

"100gb":{

name:"100GB BURE",

summary:"Pata intaneti ya kasi kabisa kupitia Starlink kwa Simu.",

details:[
"100GB bure ya intaneti",
"Muunganisho wa kasi sana",
"Inafaa kwa video, TikTok, YouTube na browsing",
"Ofa maalum kwa muda mfupi"
]

}

};

let selectedPlan=null;

const modal=document.getElementById("modal");
const title=document.getElementById("title");
const summary=document.getElementById("summary");
const details=document.getElementById("details");

document.querySelectorAll(".plan-card").forEach(card=>{

card.onclick=()=>{

const p=plans[card.dataset.id];

selectedPlan=p;

title.textContent=p.name;
summary.textContent=p.summary;

details.innerHTML=p.details.map(d=>`<div>• ${d}</div>`).join("");

modal.style.display="flex";

};

});

function closeModal(){

modal.style.display="none";

}

function goLogin(){

sessionStorage.setItem("selectedPlan",JSON.stringify(selectedPlan));

window.location.href="login.html";

}

modal.onclick=e=>{

if(e.target===modal) closeModal();

};

</script>

</body>

</html>
